<section class="search-bar">
  <label [id]="labelId" class="visually-hidden">{{ accessibleLabel }}</label>
  <ion-searchbar
    [attr.aria-labelledby]="labelId"
    [attr.aria-label]="accessibleLabel"
    [placeholder]="placeholder"
    [value]="value"
    [debounce]="debounce"
    [disabled]="disabled"
    [animated]="false"
    (ionInput)="onInput($event)"
  ></ion-searchbar>
</section>
