<ion-content class="category-list__viewport" [fullscreen]="true">
  <div class="category-list__container" [class.category-list__container--loading]="loading">
    <header class="category-list__toolbar">
      <app-page-header
        title="Categorías"
        subtitle="Organiza tus tareas por contexto."
        [showBackButton]="true"
        backAriaLabel="Volver a tareas"
        (back)="navigateToTasks()"
      ></app-page-header>
    </header>

    <main
      class="category-list__content"
      [class.category-list__content--empty]="showContent && !hasCategories"
      [class.category-list__content--list]="showContent && hasCategories"
    >
      <div *ngIf="loading" class="category-list__loading" aria-busy="true">
        <ion-spinner name="crescent" aria-label="Cargando categorías"></ion-spinner>
      </div>

      <p *ngIf="error" class="category-list__error" role="alert">{{ error }}</p>

      <ng-container *ngIf="showContent">
        <app-empty-state
          *ngIf="!hasCategories"
          icon="pricetags-outline"
          title="Aún no hay categorías"
          description="Las categorías te ayudan a clasificar tus tareas."
          buttonText="Añade tu primera categoría"
          (action)="openCreateModal()"
        ></app-empty-state>

        <ul *ngIf="hasCategories" class="category-list__list" aria-label="Lista de categorías">
          <li
            *ngFor="let category of categories; trackBy: trackByCategoryId"
            class="category-list__item"
          >
            <app-category-card
              [category]="category"
              (edit)="onEditCategory($event)"
              (delete)="onDeleteCategory($event)"
            ></app-category-card>
          </li>
        </ul>
      </ng-container>
    </main>
  </div>

  <app-floating-action-button
    *ngIf="hasCategories"
    icon="add"
    ariaLabel="Nueva categoría"
    (action)="openCreateModal()"
  ></app-floating-action-button>

  <ion-modal
    class="category-list__modal"
    [isOpen]="isCreateModalOpen"
    aria-labelledby="category-form-modal-title"
    aria-describedby="category-form-modal-description"
    (didDismiss)="closeCreateModal()"
  >
    <ng-template>
      <ion-content class="category-list__modal-content">
        <app-category-form
          [category]="editingCategory ?? undefined"
          [submitButtonText]="editingCategory ? 'Guardar' : 'Guardar categoría'"
          (submitCategory)="onSubmitCategory($event)"
          (cancel)="closeCreateModal()"
        ></app-category-form>
      </ion-content>
    </ng-template>
  </ion-modal>

  <ion-toast
    [isOpen]="toastOpen"
    [message]="toastMessage"
    [color]="toastColor"
    [duration]="2000"
    [attr.role]="toastColor === 'danger' ? 'alert' : 'status'"
    position="bottom"
    (didDismiss)="toastOpen = false"
  ></ion-toast>
</ion-content>
