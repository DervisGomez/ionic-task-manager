<ion-content class="task-list__viewport" [fullscreen]="true">
  <div class="task-list__container">
    <header class="task-list__toolbar">
      <app-page-header
        title="Gestor de tareas"
        subtitle="Organiza tu día y enfócate en lo importante."
        [actionIcon]="isCategoriesAdminEnabled ? 'pricetags-outline' : undefined"
        [actionAriaLabel]="isCategoriesAdminEnabled ? 'Administrar categorías' : undefined"
        (action)="navigateToCategories()"
      ></app-page-header>

      <app-search-bar
        ariaLabel="Buscar tareas"
        placeholder="Buscar tareas..."
        [value]="searchTerm"
        (valueChange)="onSearchChanged($event)"
      ></app-search-bar>

      <app-category-filter
        [categories]="categories"
        [selected]="selectedCategory"
        (selectedChange)="onCategorySelected($event)"
      ></app-category-filter>

      <app-task-benchmark-panel *ngIf="!isProduction"></app-task-benchmark-panel>
    </header>

    <main
      class="task-list__content"
      [class.task-list__content--empty]="!hasTasks"
      [class.task-list__content--list]="hasTasks"
    >
      <ng-container *ngIf="showNoTasksEmptyState">
        <app-empty-state
          icon="clipboard-outline"
          title="Aún no tienes tareas"
          description="Crea tu primera tarea para comenzar a organizar tu día."
          buttonText="Nueva tarea"
          (action)="openCreateModal()"
        ></app-empty-state>
      </ng-container>

      <ng-container *ngIf="showNoResultsEmptyState">
        <app-empty-state
          icon="search-outline"
          title="No encontramos tareas"
          description="No hay tareas que coincidan con los filtros actuales."
          buttonText="Limpiar filtros"
          (action)="clearFilters()"
        ></app-empty-state>
      </ng-container>

      <ul *ngIf="hasTasks" class="task-list__list" aria-label="Lista de tareas">
        <li *ngFor="let task of visibleTasks; trackBy: trackByTaskId" class="task-list__item">
          <app-task-card
            [task]="task"
            (toggleCompleted)="onToggleCompleted($event)"
            (edit)="onEditTask($event)"
            (delete)="onDeleteTask($event)"
          ></app-task-card>
        </li>
      </ul>

      <ion-infinite-scroll
        *ngIf="hasTasks && showInfiniteScroll"
        (ionInfinite)="onLoadMore($event)"
        [disabled]="!hasMoreVisibleTasks"
      >
        <ion-infinite-scroll-content></ion-infinite-scroll-content>
      </ion-infinite-scroll>
    </main>
  </div>

  <app-floating-action-button
    *ngIf="hasAnyTasks"
    icon="add"
    ariaLabel="Crear tarea"
    (action)="openCreateModal()"
  ></app-floating-action-button>

  <ion-modal
    class="task-list__modal"
    [isOpen]="isCreateModalOpen"
    aria-labelledby="task-form-modal-title"
    aria-describedby="task-form-modal-description"
    (didDismiss)="closeCreateModal()"
  >
    <ng-template>
      <ion-content class="task-list__modal-content">
        <app-task-form
          [categories]="categories"
          [task]="editingTask ?? undefined"
          [submitButtonText]="editingTask ? 'Guardar' : 'Guardar tarea'"
          (submitTask)="onSubmitTask($event)"
          (cancel)="closeCreateModal()"
        ></app-task-form>
      </ion-content>
    </ng-template>
  </ion-modal>

  <ion-toast
    [isOpen]="toastOpen"
    [message]="toastMessage"
    [color]="toastColor"
    [duration]="2000"
    [attr.role]="toastColor === 'danger' ? 'alert' : 'status'"
    position="bottom"
    (didDismiss)="toastOpen = false"
  ></ion-toast>
</ion-content>
