<ion-content [fullscreen]="true">
  <div class="task-list__container">
    <!-- Page Header -->
    <app-page-header
      title="Gestor de tareas"
      subtitle="Organiza tu día y enfócate en lo importante."
    ></app-page-header>

    <!-- Search -->
    <app-search-bar
      placeholder="Buscar tareas..."
      [value]="searchTerm"
      (valueChange)="onSearchChanged($event)"
    ></app-search-bar>

    <!-- Filters -->
    <app-category-filter
      [options]="categories"
      [selected]="selectedCategory"
      (selectedChange)="onCategorySelected($event)"
    ></app-category-filter>

    <!-- Content -->
    <main class="task-list__content">
      <app-task-form (submitTask)="onCreateTask($event)"></app-task-form>

      <!-- Empty State -->
      <ng-container *ngIf="tasks.length === 0">
        <app-empty-state
          icon="clipboard-outline"
          title="Aún no hay tareas"
          description="Crea tu primera tarea y comienza a organizar tu día."
          buttonText="Añade tu primera tarea"
        ></app-empty-state>
      </ng-container>

      <ion-list *ngIf="tasks.length > 0">
        <ion-item *ngFor="let task of tasks">{{ task.title }}</ion-item>
      </ion-list>
    </main>
  </div>

  <!-- Floating Action Button -->
  <app-floating-action-button icon="add" ariaLabel="Crear tarea"></app-floating-action-button>
</ion-content>
